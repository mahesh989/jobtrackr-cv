name: CI

# Runs on every PR and on pushes to main. The "required" jobs below are all
# currently green against the tree (verified 2026-06-11). eslint is reported
# but non-blocking: the repo inherited 66 lint errors that must be burned down
# before it can become a hard gate (see the `web-lint` job).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Hard gates: must pass to merge ──────────────────────────────────────────

  guards:
    name: Repo guards (auth + migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Route auth guard
        run: node frontend/web/scripts/check-route-auth.mjs
      - name: Migration version lint
        run: node shared/supabase/scripts/lint-migrations.mjs

  web-typecheck:
    name: web · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  cv-backend-tests:
    name: cv-backend · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/api/requirements.txt
      - run: pip install -r requirements.txt pytest pytest-asyncio
      - run: pytest -q

  # ── Non-blocking report: lint debt to burn down (66 errors as of 2026-06-11) ─

  web-lint:
    name: web · eslint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - run: npm ci
      - run: npx eslint .
