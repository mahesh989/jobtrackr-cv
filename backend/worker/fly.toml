app = 'jobtrackr-worker'
primary_region = 'syd'

[build]
  dockerfile = "Dockerfile"

[processes]
  worker = 'node dist/index.js'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['worker']

# No [[checks]] here — considered and dropped. This is a background BullMQ
# worker with no http_service, so a failing check has nothing to act on:
# it doesn't trigger a restart (that's restart_policy, keyed on process
# exit, not check status) and doesn't reroute traffic (nothing to reroute).
# It would only be a status flag in `fly checks list` that nothing reads.
# Crash/OOM recovery is already handled for free by Fly's default
# restart_policy (on-failure) on process exit — no config needed here.
# Real-time crash *alerting* (vs. auto-recovery) remains a known gap,
# deferred: see docs/MIGRATION_PLAN.md §5 Phase 3 follow-up notes.