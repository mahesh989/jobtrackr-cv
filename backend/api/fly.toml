# Fly.io config for the JobTrackr CV-tailoring pipeline service.
#
# This service is INTERNAL — only JobTrackr's Next.js API routes call it,
# with HMAC-signed requests. No browser ever hits it directly.
#
# Set secrets via flyctl, not in this file:
#   flyctl secrets set --app jobtrackr-cv-api \
#     SUPABASE_URL=... SUPABASE_ANON_KEY=... SUPABASE_SERVICE_ROLE_KEY=... \
#     SUPABASE_DB_URL=... JOBTRACKR_HMAC_SECRET=...

app             = "jobtrackr-cv-api"
primary_region  = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT        = "8000"
  ENVIRONMENT = "production"
  LOG_LEVEL   = "INFO"

[http_service]
  internal_port       = 8000
  force_https         = true
  # Keep one machine permanently warm. The API cold-starts in 5-10s and
  # Vercel Hobby kills function calls at 10s, so a cold API reliably
  # causes "Failed to fetch" on the first request after idle. Cost: one
  # shared-cpu-1x VM (~$3-5/mo).
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
